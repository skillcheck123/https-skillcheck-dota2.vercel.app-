<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkillCheck — Регистрация аналитика</title>

<style>

* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    background: #0b0d12;
    color: white;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 90%;
    max-width: 520px;
    background: #151820;
    border: 1px solid #303541;
    border-radius: 16px;
    padding: 32px;
}

h1 {
    margin-bottom: 10px;
}

.subtitle {
    color: #9da3b0;
    margin-bottom: 25px;
}

input,
select,
textarea {

    width: 100%;
    padding: 14px;
    margin-top: 7px;
    margin-bottom: 16px;

    background: #0d1016;
    color: white;

    border: 1px solid #303541;
    border-radius: 8px;

    font-size: 15px;

}

textarea {
    height: 100px;
    resize: none;
}

label {
    color: #c5cad3;
}

button {

    width: 100%;
    padding: 15px;

    background: #ff4655;
    color: white;

    border: none;
    border-radius: 8px;

    font-size: 16px;
    font-weight: bold;

    cursor: pointer;

}

button:hover {
    background: #e63645;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 25px;
}

.logo span {
    color: #ff4655;
}

</style>

</head>

<body>

<div class="container">

    <div class="logo">
        Skill<span>Check</span>
    </div>

    <h1>
        Стать аналитиком
    </h1>

    <p class="subtitle">

        Создай профиль и начни получать заявки
        на разборы Dota 2.

    </p>


    <label>
        Никнейм
    </label>

    <input
        type="text"
        id="username"
        placeholder="Например: NotMe"
    >


    <label>
        Email
    </label>

    <input
        type="email"
        id="email"
        placeholder="example@mail.com"
    >


    <label>
        Пароль
    </label>

    <input
        type="password"
        id="password"
        placeholder="Придумай пароль"
    >


    <label>
        Твоя роль
    </label>

    <select id="role">

        <option value="">
            Выбери роль
        </option>

        <option value="Carry">
            Carry — Position 1
        </option>

        <option value="Mid">
            Mid — Position 2
        </option>

        <option value="Offlane">
            Offlane — Position 3
        </option>

        <option value="Support">
            Support — Position 4/5
        </option>

    </select>


    <label>
        Твой MMR
    </label>

    <input
        type="number"
        id="mmr"
        placeholder="Например: 10000"
    >


    <label>
        Цена одного разбора ₽
    </label>

    <input
        type="number"
        id="price"
        placeholder="Например: 1000"
    >


    <label>
        Расскажи о себе
    </label>

    <textarea
        id="description"
        placeholder="Например: играю на 4 позиции 5 лет..."
    ></textarea>


    <button onclick="registerAnalyst()">

        Создать профиль

    </button>

</div>


<script>

const SUPABASE_URL =
"https://xzwzulhnwzcfsgcdibtv.supabase.co";

const SUPABASE_KEY =
"sb_publishable_0Z5dWG3a_dXX-dd5b2cZEg_z1C6IvFS";


async function registerAnalyst() {


    const username =
    document
        .getElementById("username")
        .value;


    const email =
    document
        .getElementById("email")
        .value;


    const password =
    document
        .getElementById("password")
        .value;


    const role =
    document
        .getElementById("role")
        .value;


    const mmr =
    document
        .getElementById("mmr")
        .value;


    const price =
    document
        .getElementById("price")
        .value;


    const description =
    document
        .getElementById("description")
        .value;


    if (
        !username ||
        !email ||
        !password ||
        !role ||
        !mmr ||
        !price
    ) {

        alert(
            "Заполни все обязательные поля"
        );

        return;

    }


    try {


        const response =
        await fetch(

            SUPABASE_URL +
            "/rest/v1/analysts",

            {

                method: "POST",

                headers: {

                    "Content-Type":
                    "application/json",

                    "apikey":
                    SUPABASE_KEY,

                    "Authorization":
                    "Bearer " +
                    SUPABASE_KEY,

                    "Prefer":
                    "return=minimal"

                },


                body:
                JSON.stringify({

                    username:
                    username,

                    email:
                    email,

                    password:
                    password,

                    role:
                    role,

                    mmr:
                    parseInt(mmr),

                    price:
                    parseInt(price),

                    description:
                    description

                })

            }

        );


        if (
            !response.ok
        ) {

            throw new Error(
                await response.text()
            );

        }


        alert(
            "Профиль аналитика создан!"
        );


        window.location.href =
        "index.html";


    } catch (error) {


        alert(
            "Ошибка:\n" +
            error.message
        );

    }

}

</script>

</body>

</html>
